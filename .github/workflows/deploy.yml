name: Deploy MarineIQ
on:
  push:
    branches:
      - main

jobs:
  deploy_frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Build
        env:
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
        run: npm run build
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "/dist"
          output_location: ""
          skip_app_build: true

  deploy_api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Zip API package
        run: cd api && zip -r ../api.zip . -x "*.git*" -x "node_modules/*"
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy to Azure Functions
        run: |
          az functionapp deployment source config-zip \
            --name func-marineiq-prod \
            --resource-group rg-marineiq-prod-eastus2 \
            --src api.zip
      - name: Sync function triggers
        run: |
          SUB=$(az account show --query id -o tsv)
          az rest --method post \
            --url "https://management.azure.com/subscriptions/${SUB}/resourceGroups/rg-marineiq-prod-eastus2/providers/Microsoft.Web/sites/func-marineiq-prod/syncfunctiontriggers?api-version=2022-03-01"
      - name: Restart function app
        run: az functionapp restart --name func-marineiq-prod --resource-group rg-marineiq-prod-eastus2
