<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarineIQ — Sign in</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { width: 100%; max-width: 360px; background: #fff; border-radius: 16px; border: 1px solid rgba(0,0,0,0.1); overflow: hidden; }
    .hero { background: #0c2a4a; padding: 36px 24px 28px; text-align: center; color: #fff; }
    .anchor { font-size: 48px; margin-bottom: 12px; }
    .title { font-size: 24px; font-weight: 600; }
    .subtitle { font-size: 13px; opacity: 0.6; margin-top: 6px; }
    .body { padding: 24px 20px; display: flex; flex-direction: column; gap: 12px; }
    .tabs { display: flex; background: #f5f5f3; border-radius: 8px; padding: 3px; gap: 2px; }
    .tab { flex: 1; padding: 8px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: #888780; font-family: inherit; }
    .tab.active { background: #fff; color: #1a1a1a; border: 0.5px solid rgba(0,0,0,0.1); }
    label { font-size: 11px; color: #888780; display: block; margin-bottom: 4px; }
    input { width: 100%; padding: 11px 14px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.15); font-size: 14px; font-family: inherit; outline: none; background: #f5f5f3; }
    input:focus { border-color: #185FA5; background: #fff; }
    .btn { width: 100%; padding: 13px; border-radius: 10px; border: none; background: #0c2a4a; color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .btn:hover { background: #1a3f6b; }
    .btn:disabled { background: #ccc; cursor: default; }
    .error { font-size: 12px; color: #A32D2D; background: #FCEBEB; padding: 10px 12px; border-radius: 8px; display: none; }
    .terms { font-size: 10px; color: #888780; text-align: center; line-height: 1.5; }
    .panel { display: none; flex-direction: column; gap: 12px; }
    .panel.active { display: flex; }
  </style>
</head>
<body>
  <div class="card">
    <div class="hero">
      <div class="anchor">&#9875;</div>
      <div class="title">MarineIQ</div>
      <div class="subtitle">Sailor training and logbook companion</div>
    </div>
    <div class="body">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login', this)">Sign in</button>
        <button class="tab" onclick="switchTab('register', this)">Create account</button>
      </div>

      <div id="error" class="error"></div>

      <div id="panel-login" class="panel active">
        <div>
          <label>Email address</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div>
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')signIn()" />
        </div>
        <button class="btn" id="login-btn" onclick="signIn()">Sign in</button>
      </div>

      <div id="panel-register" class="panel">
        <div>
          <label>Your name</label>
          <input type="text" id="reg-name" placeholder="Don Breyde" autocomplete="name" />
        </div>
        <div>
          <label>Email address</label>
          <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div>
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min 8 characters" autocomplete="new-password" onkeydown="if(event.key==='Enter')signUp()" />
        </div>
        <button class="btn" id="reg-btn" onclick="signUp()">Create account</button>
      </div>

      <div class="terms">Your logbook data is private and never shared.</div>
    </div>
  </div>

  <script>
    const API = 'https://func-marineiq-prod.azurewebsites.net/api'
    const KEY = 'CQN6FRAKtdEEaAZMvSCZUuxkffGEhLfPZnKqh_XtyzXAAzFuMcVZ6Q=='

    function switchTab(tab, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'))
      el.classList.add('active')
      document.getElementById('panel-' + tab).classList.add('active')
      document.getElementById('error').style.display = 'none'
    }

    function showError(msg) {
      const el = document.getElementById('error')
      el.textContent = msg
      el.style.display = 'block'
    }

    async function signIn() {
      const email = document.getElementById('login-email').value.trim()
      const password = document.getElementById('login-password').value
      document.getElementById('error').style.display = 'none'
      if (!email || !password) { showError('Please enter your email and password.'); return }
      const btn = document.getElementById('login-btn')
      btn.disabled = true
      btn.textContent = 'Signing in...'
      try {
        const res = await fetch(`${API}/auth?code=${KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ action: 'login', email, password })
        })
        const data = await res.json()
       if (res.ok && data.userId) {
        localStorage.setItem('marineiq_token', data.token)
        window.location.href = '/'
      } else {
          showError(data.error || 'Invalid email or password.')
          btn.disabled = false
          btn.textContent = 'Sign in'
        }
      } catch (e) {
        showError('Connection error. Please try again.')
        btn.disabled = false
        btn.textContent = 'Sign in'
      }
    }

    async function signUp() {
      const name = document.getElementById('reg-name').value.trim()
      const email = document.getElementById('reg-email').value.trim()
      const password = document.getElementById('reg-password').value
      document.getElementById('error').style.display = 'none'
      if (!email || !password) { showError('Please enter your email and password.'); return }
      if (password.length < 8) { showError('Password must be at least 8 characters.'); return }
      const btn = document.getElementById('reg-btn')
      btn.disabled = true
      btn.textContent = 'Creating account...'
      try {
        const res = await fetch(`${API}/auth?code=${KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ action: 'register', email, password, name })
        })
        const data = await res.json()
        if (res.ok && data.userId) {
          localStorage.setItem('marineiq_token', data.token)
          window.location.href = '/'
        } else {
          showError(data.error || 'Could not create account.')
          btn.disabled = false
          btn.textContent = 'Create account'
        }
      } catch (e) {
        showError('Connection error. Please try again.')
        btn.disabled = false
        btn.textContent = 'Create account'
      }
    }
  </script>
</body>
</html>
